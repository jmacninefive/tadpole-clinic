version: '3.8'
services:
  jenkins:
  # https://www.jenkins.io/doc/book/installing/docker/#on-windows
    build:
      context: .
      dockerfile: Dockerfile.jenkins
    pull_policy: build
    privileged: true
    user: root
    ports:
     - 8080:8080
     - 50000:50000
    container_name: jenkins
    environment:
      - DOCKER_HOST=tcp://docker:2376
      - DOCKER_CERT_PATH=/certs/client
      - DOCKER_TLS_VERIFY=1
    volumes:
     - D:\Docker\jenkins_compose\jenkins_configuration:/var/jenkins_home
     - D:\Docker\jenkins_compose\certs:/certs/client:ro
  docker:
    image: docker:dind
    container_name: jenkins-docker
    privileged: true
    ports:
      - 2376:2376
    environment:
      - DOCKER_TLS_CERTDIR=/certs
    volumes:
      - D:\Docker\jenkins_compose\certs:/certs/client
      - D:\Docker\jenkins_compose\jenkins_configuration:/var/jenkins_home

  #artifactory:
  # https://docs.jfrog.com/installation/docs/docker